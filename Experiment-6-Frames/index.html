<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iFrame Navigation Example</title>

<style>
body{
    font-family: Arial;
}

h1{
    text-align: center;
}

.menu{
    margin-bottom: 20px;
    text-align: center;
}

.menu a{
    margin: 10px;
    padding: 8px 15px;
    background-color: lightblue;
    text-decoration: none;
    color: black;
    border-radius: 5px;
}

.menu a:hover{
    background-color: skyblue;
}

iframe{
    display: block;
    margin: auto;
    border: 3px solid black;
}
</style>

</head>

<body>

<h1>Experiment 6 – Working with iFrames</h1>

<div class="menu">
<a href="https://example.com" target="contentFrame">Example</a>
<a href="https://www.openstreetmap.org/export/embed.html" target="contentFrame">Map</a>
<a href="https://www.wikipedia.org/wiki/Main_Page?printable=yes" target="contentFrame">Wiki Page</a>
</div>

<iframe name="contentFrame"
        width="900"
        height="500"
        src="https://example.com"
        title="Content Frame">
</iframe>

</body>
</html>
